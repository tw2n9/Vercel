services:
  postgres:
    image: postgres:16-alpine
    container_name: barbearia_mvp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barbearia_mvp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d barbearia_mvp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
